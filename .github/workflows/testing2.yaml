# .github/workflows/main.yml
name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js (or your runtime)
        uses: actions/setup-node@v3
        with:
          python-version: '3.11'

      - name: Install dependencies python
        run: pip install -r requirements.txt

      - name: Testeo
        run: pytest

      - name: Run tests
        run: npm test